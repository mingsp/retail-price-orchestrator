services:
  postgres:
    image: postgres:16-alpine
    container_name: retail-orchestrator-postgres
    environment:
      POSTGRES_USER: retail
      POSTGRES_PASSWORD: retail
      POSTGRES_DB: retail_orchestrator
    ports:
      - "55432:5432"
    volumes:
      - retail_postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retail -d retail_orchestrator"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: retail-orchestrator-redis
    ports:
      - "56379:6379"
    volumes:
      - retail_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: retail-orchestrator-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: retail
      MINIO_ROOT_PASSWORD: retail-password
    ports:
      - "59000:9000"
      - "59001:9001"
    volumes:
      - retail_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  retail_postgres_data:
  retail_redis_data:
  retail_minio_data:

